<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon_black.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="%PUBLIC_URL%/favicon_white.png" media="(prefers-color-scheme: dark)" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="SchoolCoreOS - Modern Multi-Institute Management Platform"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon_black.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('appTheme') || 'light';
          document.documentElement.setAttribute('data-theme', savedTheme);
          
          // Helper to update favicon based on theme
          function updateFavicon(theme) {
            var icon = document.querySelector('link[rel="icon"]');
            if (icon) {
              icon.href = theme === 'dark' ? '%PUBLIC_URL%/favicon_white.png' : '%PUBLIC_URL%/favicon_black.png';
              // Remove media query when manually overridden
              icon.removeAttribute('media');
            }
          }
          
          // Initial favicon sync with stored app theme
          updateFavicon(savedTheme);
        } catch (e) {}
      })();
    </script>
    <title>SchoolCoreOS</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

</html>
